<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insight CMS - Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#0f172a;color:#e2e8f0;padding:20px;}
.login-container{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#1e1e2f);}
.login-card{background:rgba(30,41,59,0.85);backdrop-filter:blur(14px);border-radius:32px;padding:40px;width:100%;max-width:420px;}
.login-card h2{text-align:center;margin-bottom:28px;background:linear-gradient(135deg,#f97316,#e74c3c);-webkit-background-clip:text;background-clip:text;color:transparent;}
.input-group{margin-bottom:20px;position:relative;}
.input-group input{width:100%;padding:14px 18px;background:#0f172a;border:1px solid #334155;border-radius:30px;color:white;font-size:0.9rem;}
.toggle-pwd{position:absolute;right:18px;bottom:14px;cursor:pointer;color:#9ca3af;}
.login-btn{width:100%;background:linear-gradient(95deg,#e74c3c,#f97316);border:none;padding:14px;border-radius:40px;font-weight:700;color:white;cursor:pointer;}
.error-msg{color:#f87171;text-align:center;margin-top:16px;}
.dashboard{max-width:1400px;margin:0 auto;}
.card{background:#1e293b;border-radius:28px;padding:24px;margin-bottom:24px;border:1px solid #334155;}
.card-title{font-size:1.3rem;font-weight:700;margin-bottom:20px;border-left:4px solid #f97316;padding-left:16px;}
.form-group{margin-bottom:20px;}
label{display:block;margin-bottom:8px;font-weight:600;}
input,select,textarea{width:100%;padding:12px 16px;background:#0f172a;border:1px solid #334155;border-radius:20px;color:white;}
.file-upload-group{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;}
.btn-cloud{background:#2c3e66;border:none;padding:8px 18px;border-radius:40px;color:white;cursor:pointer;}
.add-btn{background:#3b82f6;border:none;padding:8px 18px;border-radius:30px;color:white;cursor:pointer;margin-top:8px;}
.btn-primary{background:linear-gradient(95deg,#e74c3c,#f97316);border:none;padding:10px 28px;border-radius:40px;font-weight:700;cursor:pointer;margin-right:12px;color:white;}
.btn-secondary{background:#4b5563;border:none;padding:10px 28px;border-radius:40px;color:white;cursor:pointer;}
.media-item{display:flex;gap:10px;margin-bottom:10px;align-items:center;flex-wrap:wrap;}
.remove-btn{background:#dc2626;border:none;padding:6px 14px;border-radius:30px;color:white;cursor:pointer;}
.news-list{display:flex;flex-direction:column;gap:16px;}
.news-item{background:#0f172a;border-radius:20px;padding:16px;display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
.news-item img{width:80px;height:60px;object-fit:cover;border-radius:12px;}
.news-info{flex:1;}
.news-actions{display:flex;gap:8px;}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:16px;}
.logout-btn{background:#1f2937;border:none;padding:8px 20px;border-radius:40px;color:white;cursor:pointer;}
.preview-img{max-width:100px;max-height:60px;margin-top:8px;border-radius:12px;display:none;}
@media (max-width:768px){.news-item{flex-direction:column;align-items:flex-start;}}
</style>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body id="app"></body>
<script>
// Konfigurasi
const firebaseConfig = { apiKey:"AIzaSyDC8hsDbX3qb9XLY7H2ChdXK6AxRPXD2q0", authDomain:"dataku-40827.firebaseapp.com", databaseURL:"https://dataku-40827-default-rtdb.asia-southeast1.firebasedatabase.app", projectId:"dataku-40827", storageBucket:"dataku-40827.firebasestorage.app" };
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth(), db=firebase.database();
const CLOUD_NAME="dg8fcmrss", UPLOAD_PRESET="Insigh";
const CLOUD_API_KEY="238935634886758", CLOUD_API_SECRET="GyQHlM1gvN85zQEMzzZLas0oZ8o";
async function uploadToCloudinary(file){ let fd=new FormData(); fd.append('file',file); fd.append('upload_preset',UPLOAD_PRESET); let res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{method:'POST',body:fd}); let data=await res.json(); return data.secure_url||null; }
async function deleteFromCloudinary(publicId){ let url=`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/resources/image/upload/${publicId}`; let authStr=btoa(`${CLOUD_API_KEY}:${CLOUD_API_SECRET}`); let res=await fetch(url,{method:'DELETE',headers:{'Authorization':`Basic ${authStr}`}}); return res.ok; }
function extractPublicId(url){ if(!url||!url.includes('cloudinary.com')) return null; let m=url.match(/\/upload\/(?:v\d+\/)?(.+?)\.(jpg|jpeg|png|gif|webp)/i); if(!m) m=url.match(/\/upload\/(?:v\d+\/)?(.+?)(\?|$)/); return m?m[1]:null; }
async function deleteImagesFromUrls(urls){ for(let u of urls){ let pid=extractPublicId(u); if(pid) await deleteFromCloudinary(pid); } }
function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function convertToHtml(text){ if(!text) return ''; let blocks=text.split(/\r?\n\r?\n/); let result=''; for(let b of blocks){ b=b.trim(); if(!b) continue; let lines=b.split(/\r?\n/); result+='<p>'+lines.join('<br>')+'</p>'; } return result; }
let currentUser=null, allNews=[], editId=null, imagesArr=[], videosArr=[];
let idleTimer; const IDLE_TIMEOUT=30*60*1000;
function resetIdle(){ if(idleTimer) clearTimeout(idleTimer); idleTimer=setTimeout(()=>{ if(currentUser){ alert('Auto logout karena tidak aktif 30 menit'); auth.signOut(); } },IDLE_TIMEOUT); }
function attachActivity(){ ['mousedown','keydown','scroll','touchstart'].forEach(ev=>window.addEventListener(ev,resetIdle)); resetIdle(); }
function render(){ document.getElementById('app').innerHTML=currentUser?renderDashboard():renderLogin(); if(currentUser){ attachActivity(); loadNews(); attachEvents(); } else document.getElementById('loginBtn')?.addEventListener('click',doLogin); }
function renderLogin(){ return `<div class="login-container"><div class="login-card"><h2><i class="fas fa-crown"></i> Insight CMS</h2><div class="input-group"><input type="email" id="loginEmail" placeholder="Email"></div><div class="input-group"><input type="password" id="loginPassword" placeholder="Password"><i class="fas fa-eye toggle-pwd" id="togglePwd" onclick="let p=document.getElementById('loginPassword');p.type=p.type==='password'?'text':'password';this.classList.toggle('fa-eye-slash');"></i></div><button class="login-btn" id="loginBtn">Login</button><div id="loginError" class="error-msg"></div></div></div>`; }
function renderDashboard(){ return `<div class="dashboard"><div class="top-bar"><h2><i class="fas fa-newspaper"></i> Insight CMS</h2><button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button></div><div class="card"><div class="card-title" id="formTitle">➕ Tambah Berita Baru</div><form id="newsForm"><div class="form-group"><label>Judul *</label><input type="text" id="title" required></div><div class="form-group"><label>Kategori</label><select id="category"><option value="breaking">Breaking</option><option value="trending">Trending</option><option value="hot">Hot</option><option value="politik">Politik</option><option value="daerah">Daerah</option><option value="ekonomi">Ekonomi</option></select></div><div class="form-group"><label>Gambar Utama</label><div class="file-upload-group"><input type="text" id="imageUrl" placeholder="URL atau upload" style="flex:1"><button type="button" id="uploadThumbBtn" class="btn-cloud"><i class="fas fa-cloud-upload-alt"></i> Upload</button></div><img id="imagePreview" class="preview-img"></div><div class="form-group"><label>Video YouTube URL</label><input type="text" id="videoUrl" placeholder="https://youtu.be/..."></div><div class="form-group"><label>Short Text</label><input type="text" id="shortText"></div><div class="form-group"><label><input type="checkbox" id="isShort"> Short News</label></div><div class="form-group"><label>Konten (HTML) *</label><textarea id="content" rows="8" placeholder="Tulis berita di sini... Tekan Enter dua kali untuk paragraf baru."></textarea></div><div class="form-group"><label>Views</label><input type="number" id="views" value="0"></div><div class="form-group"><label>📸 Galeri Gambar</label><button type="button" id="uploadGalleryBtn" class="add-btn"><i class="fas fa-cloud-upload-alt"></i> Upload + Tambah ke Galeri</button><div id="imagesContainer" class="media-list"></div><button type="button" id="addImageBtn" class="add-btn"><i class="fas fa-plus"></i> Tambah URL Galeri</button></div><div class="form-group"><label>🎥 Galeri Video</label><div id="videosContainer" class="media-list"></div><button type="button" id="addVideoBtn" class="add-btn"><i class="fas fa-plus"></i> Tambah Video</button></div><div><button type="submit" class="btn-primary">Simpan</button><button type="button" id="cancelBtn" class="btn-secondary">Batal</button></div></form></div><div class="card"><div class="card-title">📋 Daftar Berita</div><div id="newsList" class="news-list"><div class="spinner">Memuat...</div></div></div></div>`; }
async function loadNews(){ let snap=await db.ref('news').once('value'); let data=snap.val(); allNews=data?Object.entries(data).map(([id,val])=>({id,...val})).sort((a,b)=>new Date(b.date)-new Date(a.date)):[]; renderNewsList(); }
function renderNewsList(){ if(!allNews.length){ document.getElementById('newsList').innerHTML='<div class="spinner">Belum ada berita</div>'; return; }
let html=''; for(let n of allNews){ html+=`<div class="news-item"><img src="${n.image||(n.images&&n.images[0])||'https://placehold.co/80x60'}" onerror="this.src='https://placehold.co/80x60'"><div class="news-info"><strong>${escapeHtml(n.title)}</strong><div class="news-meta">${n.category} | ${new Date(n.date).toLocaleDateString('id-ID')} | ${n.views||0} views</div></div><div class="news-actions"><button class="edit-news" data-id="${n.id}" style="background:#3b82f6;border:none;padding:6px 12px;border-radius:30px;color:white;cursor:pointer;">Edit</button><button class="delete-news" data-id="${n.id}" style="background:#dc2626;border:none;padding:6px 12px;border-radius:30px;color:white;cursor:pointer;">Hapus</button></div></div>`; }
document.getElementById('newsList').innerHTML=html;
document.querySelectorAll('.edit-news').forEach(btn=>btn.addEventListener('click',()=>editNews(btn.dataset.id)));
document.querySelectorAll('.delete-news').forEach(btn=>btn.addEventListener('click',async()=>{ if(confirm('Hapus berita & semua gambar di Cloudinary?')){ let news=allNews.find(n=>n.id===btn.dataset.id); let allImgs=[news.image,...(news.images||[])].filter(Boolean); await deleteImagesFromUrls(allImgs); await db.ref(`news/${btn.dataset.id}`).remove(); await loadNews(); if(editId===btn.dataset.id) resetForm(); } })); }
function resetForm(){ document.getElementById('title').value=''; document.getElementById('category').value='breaking'; document.getElementById('imageUrl').value=''; document.getElementById('videoUrl').value=''; document.getElementById('shortText').value=''; document.getElementById('isShort').checked=false; document.getElementById('content').value=''; document.getElementById('views').value='0'; imagesArr=[]; videosArr=[]; renderMediaInputs(); document.getElementById('formTitle').innerHTML='➕ Tambah Berita Baru'; document.getElementById('imagePreview').style.display='none'; editId=null; }
function renderMediaInputs(){ let imgDiv=document.getElementById('imagesContainer'); if(imgDiv){ imgDiv.innerHTML=''; imagesArr.forEach((url,i)=>{ let d=document.createElement('div'); d.className='media-item'; d.innerHTML=`<input type="text" value="${escapeHtml(url)}" class="imgField" data-idx="${i}" style="flex:1"><button class="remove-btn" data-idx="${i}" data-type="img">Hapus</button>`; imgDiv.appendChild(d); }); document.querySelectorAll('.imgField').forEach(inp=>inp.addEventListener('change',(e)=>{ let idx=parseInt(e.target.dataset.idx); imagesArr[idx]=e.target.value; renderMediaInputs(); })); document.querySelectorAll('.remove-btn[data-type="img"]').forEach(btn=>btn.addEventListener('click',(e)=>{ let idx=parseInt(btn.dataset.idx); imagesArr.splice(idx,1); renderMediaInputs(); })); }
let vidDiv=document.getElementById('videosContainer'); if(vidDiv){ vidDiv.innerHTML=''; videosArr.forEach((url,i)=>{ let d=document.createElement('div'); d.className='media-item'; d.innerHTML=`<input type="text" value="${escapeHtml(url)}" class="vidField" data-idx="${i}" style="flex:1"><button class="remove-btn" data-idx="${i}" data-type="vid">Hapus</button>`; vidDiv.appendChild(d); }); document.querySelectorAll('.vidField').forEach(inp=>inp.addEventListener('change',(e)=>{ let idx=parseInt(e.target.dataset.idx); videosArr[idx]=e.target.value; renderMediaInputs(); })); document.querySelectorAll('.remove-btn[data-type="vid"]').forEach(btn=>btn.addEventListener('click',(e)=>{ let idx=parseInt(btn.dataset.idx); videosArr.splice(idx,1); renderMediaInputs(); })); } }
async function editNews(id){ let snap=await db.ref(`news/${id}`).once('value'); let n=snap.val(); if(n){ document.getElementById('title').value=n.title; document.getElementById('category').value=n.category||'breaking'; document.getElementById('imageUrl').value=n.image||''; document.getElementById('videoUrl').value=n.videoUrl||''; document.getElementById('shortText').value=n.shortText||''; document.getElementById('isShort').checked=n.isShort||false; document.getElementById('content').value=n.content||''; document.getElementById('views').value=n.views||0; imagesArr=n.images?[...n.images]:[]; videosArr=n.videos?[...n.videos]:[]; renderMediaInputs(); let preview=document.getElementById('imagePreview'); if(n.image){ preview.src=n.image; preview.style.display='block'; }else preview.style.display='none'; document.getElementById('formTitle').innerHTML='✏️ Edit Berita'; editId=id; window.scrollTo({top:0,behavior:'smooth'}); } }
async function handleSave(e){ e.preventDefault(); let id=editId; let title=document.getElementById('title').value.trim(); if(!title){ alert('Judul wajib diisi'); return; }
let contentRaw=document.getElementById('content').value; let contentHtml=convertToHtml(contentRaw);
let newsData={ title, category:document.getElementById('category').value, image:document.getElementById('imageUrl').value, videoUrl:document.getElementById('videoUrl').value, shortText:document.getElementById('shortText').value, isShort:document.getElementById('isShort').checked, content:contentHtml, views:parseInt(document.getElementById('views').value)||0, date:new Date().toISOString(), images:imagesArr, videos:videosArr };
if(id) await db.ref(`news/${id}`).update(newsData); else await db.ref('news').push().set(newsData); await loadNews(); resetForm(); alert('Berita tersimpan!'); }
function attachEvents(){ document.getElementById('newsForm').addEventListener('submit',handleSave); document.getElementById('cancelBtn').onclick=resetForm; document.getElementById('addImageBtn').onclick=()=>{ imagesArr.push(''); renderMediaInputs(); }; document.getElementById('addVideoBtn').onclick=()=>{ videosArr.push(''); renderMediaInputs(); }; document.getElementById('uploadThumbBtn').onclick=()=>{ let inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.onchange=async(e)=>{ let f=e.target.files[0]; if(f){ let url=await uploadToCloudinary(f); if(url){ document.getElementById('imageUrl').value=url; let prev=document.getElementById('imagePreview'); prev.src=url; prev.style.display='block'; } } }; inp.click(); }; document.getElementById('uploadGalleryBtn').onclick=()=>{ let inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.multiple=true; inp.onchange=async(e)=>{ let files=Array.from(e.target.files); for(let f of files){ let url=await uploadToCloudinary(f); if(url) imagesArr.push(url); } renderMediaInputs(); }; inp.click(); }; document.getElementById('logoutBtn').onclick=()=>auth.signOut(); let imgUrlInput=document.getElementById('imageUrl'); imgUrlInput.addEventListener('input',()=>{ let url=imgUrlInput.value; let prev=document.getElementById('imagePreview'); if(url){ prev.src=url; prev.style.display='block'; }else prev.style.display='none'; }); }
async function doLogin(){ let email=document.getElementById('loginEmail').value, pass=document.getElementById('loginPassword').value; try{ await auth.signInWithEmailAndPassword(email,pass); }catch(err){ document.getElementById('loginError').innerText=err.message; } }
auth.onAuthStateChanged(user=>{ currentUser=user; render(); });
</script>
</body>
</html>
