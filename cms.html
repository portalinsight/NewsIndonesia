<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Detail Berita - Insight News Indonesia</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; overflow-x: hidden; }
    body.dark { background: #0f172a; color: #e2e8f0; }

    /* Top Header */
    .top-header { background: linear-gradient(135deg, #1e293b, #0f172a); color: white; padding: 16px 0; border-bottom: 3px solid #e74c3c; }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
    .header-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
    .logo-text h1 a { color: white; text-decoration: none; font-size: 1.6rem; font-weight: 800; }
    .logo-text p { font-size: 0.7rem; color: #94a3b8; margin-top: 4px; }
    .datetime { font-size: 0.8rem; color: #cbd5e1; }
    .dark-mode-toggle { background: #334155; border: none; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; color: white; transition: 0.2s; }
    .dark-mode-toggle:hover { background: #475569; }

    /* Main Nav */
    .main-nav { background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
    body.dark .main-nav { background: #1e293b; }
    .nav-wrapper { max-width: 1280px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
    .nav-menu { display: flex; list-style: none; gap: 24px; flex-wrap: wrap; padding: 12px 0; }
    .nav-menu li a { text-decoration: none; color: #334155; font-weight: 600; transition: 0.2s; }
    body.dark .nav-menu li a { color: #cbd5e1; }
    .nav-menu li a:hover { color: #e74c3c; }
    .search-box { display: flex; align-items: center; background: #f1f5f9; border-radius: 40px; padding: 6px 16px; gap: 8px; }
    body.dark .search-box { background: #334155; }
    .search-box i { color: #94a3b8; }
    .search-box input { border: none; background: none; padding: 8px; outline: none; width: 200px; font-size: 0.85rem; }

    /* Detail Container - GAMBAR BESAR RESPONSIF */
    .detail-container { max-width: 900px; margin: 40px auto; background: white; border-radius: 24px; padding: 40px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
    body.dark .detail-container { background: #1e293b; }
    .detail-title { font-size: 2rem; font-weight: 800; margin-bottom: 16px; line-height: 1.3; }
    .detail-meta { display: flex; gap: 20px; color: #64748b; font-size: 0.85rem; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #e2e8f0; flex-wrap: wrap; }
    body.dark .detail-meta { border-bottom-color: #334155; }

    /* GALLERY - GAMBAR BESAR & RESPONSIF */
    .detail-gallery { margin: 24px 0; }
    .main-image { width: 100%; border-radius: 20px; overflow: hidden; cursor: pointer; background: #f1f5f5; }
    .main-image img { width: 100%; height: auto; max-height: 500px; object-fit: contain; transition: 0.3s; display: block; }
    .thumbnail-list { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
    .thumbnail { width: 100px; height: 70px; object-fit: cover; border-radius: 12px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; opacity: 0.7; }
    .thumbnail:hover, .thumbnail.active { opacity: 1; border-color: #e74c3c; transform: translateY(-2px); }
    
    /* Video Container */
    .video-container { position: relative; padding-bottom: 56.25%; height: 0; margin: 25px 0; background: #000; border-radius: 16px; overflow: hidden; }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    
    /* Share Buttons */
    .share-buttons { display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 0; }
    .share-btn { padding: 10px 20px; border-radius: 40px; color: white; font-size: 0.85rem; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; border: none; transition: 0.2s; }
    .share-btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
    .share-wa { background: #25D366; }
    .share-fb { background: #1877f2; }
    .share-twitter { background: #1da1f2; }
    .share-copy { background: #64748b; }

    /* Detail Content */
    .detail-content { font-size: 1.05rem; line-height: 1.8; color: #334155; margin-top: 24px; }
    body.dark .detail-content { color: #cbd5e1; }
    .detail-content p { margin-bottom: 1.2em; }
    .detail-content img { max-width: 100%; border-radius: 16px; margin: 1.5em 0; }
    .detail-content h2, .detail-content h3 { margin: 1.5em 0 0.5em; }

    /* Lightbox */
    .lightbox { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; align-items:center; justify-content:center; cursor:pointer; }
    .lightbox img { max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 8px; }
    .lightbox-close { position:absolute; top:20px; right:40px; font-size:2.5rem; color:white; cursor:pointer; font-weight:bold; }
    .lightbox-prev, .lightbox-next { position:absolute; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.6); color:white; border:none; font-size:2rem; padding:12px 18px; cursor:pointer; border-radius:50%; transition:0.2s; }
    .lightbox-prev { left:20px; }
    .lightbox-next { right:20px; }
    .lightbox-prev:hover, .lightbox-next:hover { background:#e74c3c; }

    /* Responsive */
    @media (max-width: 768px) {
        .detail-container { padding: 20px; margin: 20px; }
        .detail-title { font-size: 1.5rem; }
        .thumbnail { width: 70px; height: 50px; }
        .main-image img { max-height: 350px; }
        .nav-wrapper { flex-direction: column; }
        .search-box input { width: 160px; }
    }
    @media (max-width: 480px) {
        .thumbnail { width: 60px; height: 45px; }
        .share-buttons { gap: 8px; }
        .share-btn { padding: 6px 12px; font-size: 0.7rem; }
    }

    /* Spinner & Error */
    .spinner { text-align: center; padding: 40px; color: #64748b; }
    .error-message { text-align: center; padding: 40px; color: #e74c3c; }
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="top-header">
    <div class="container">
        <div class="header-content">
            <div class="logo-text">
                <h1><a href="index.html">Insight News Indonesia</a></h1>
                <p>Jurnalisme Berkualitas • Dengan Integritas</p>
            </div>
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="datetime" id="datetime"></div>
                <button class="dark-mode-toggle" id="darkModeToggle"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </div>
</div>

<div class="main-nav">
    <div class="nav-wrapper">
        <ul class="nav-menu">
            <li><a href="index.html">Beranda</a></li>
            <li><a href="breaking.html">Breaking</a></li>
            <li><a href="trending.html">Trending</a></li>
            <li><a href="hot.html">Hot News</a></li>
            <li><a href="politik.html">Politik</a></li>
            <li><a href="daerah.html">Daerah</a></li>
            <li><a href="ekonomi.html">Ekonomi</a></li>
        </ul>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Cari berita...">
        </div>
    </div>
</div>

<main>
    <div class="detail-container" id="detailContainer">
        <div class="spinner"><i class="fas fa-spinner fa-pulse"></i> Memuat berita...</div>
    </div>
</main>

<footer style="background: #0f172a; color: #94a3b8; padding: 30px 0; text-align: center; margin-top: 40px;">
    <p>&copy; 2025 Insight News Indonesia | Jurnalisme Berkualitas Dengan Integritas</p>
</footer>

<script>
    // ========== FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyDC8hsDbX3qb9XLY7H2ChdXK6AxRPXD2q0",
        authDomain: "dataku-40827.firebaseapp.com",
        databaseURL: "https://dataku-40827-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "dataku-40827",
        storageBucket: "dataku-40827.firebasestorage.app"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let galleryImages = []; // untuk lightbox navigasi

    function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function formatNumber(n) { if(n>=1e6) return (n/1e6).toFixed(1)+'M'; if(n>=1e3) return (n/1e3).toFixed(1)+'K'; return n?.toString()||'0'; }

    function getNewsIdFromUrl() {
        const hash = window.location.hash.substring(1);
        if (hash) return hash;
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
    }

    // ========== RENDER GALLERY DENGAN GAMBAR BESAR ==========
    function renderGallery(images) {
        if (!images || images.length === 0) return '';
        
        galleryImages = images; // simpan untuk lightbox
        
        let mainImage = images[0];
        let thumbnails = '';
        let galleryHtml = `
            <div class="detail-gallery">
                <div class="main-image" onclick="openLightbox(0)">
                    <img src="${mainImage}" alt="Gambar utama" id="mainGalleryImage">
                </div>
        `;
        
        if (images.length > 1) {
            galleryHtml += `<div class="thumbnail-list">`;
            images.forEach((img, idx) => {
                galleryHtml += `<img src="${img}" class="thumbnail ${idx === 0 ? 'active' : ''}" onclick="changeMainImage(${idx})" loading="lazy">`;
            });
            galleryHtml += `</div>`;
        }
        galleryHtml += `</div>`;
        
        return galleryHtml;
    }

    // Ganti gambar utama saat thumbnail diklik
    window.changeMainImage = (idx) => {
        const mainImg = document.getElementById('mainGalleryImage');
        if (mainImg && galleryImages[idx]) {
            mainImg.src = galleryImages[idx];
            // Update active class pada thumbnail
            document.querySelectorAll('.thumbnail').forEach((thumb, i) => {
                if (i === idx) thumb.classList.add('active');
                else thumb.classList.remove('active');
            });
        }
    };

    // Lightbox dengan navigasi gallery
    window.openLightbox = (startIdx = 0) => {
        if (!galleryImages.length) return;
        
        let currentIdx = startIdx;
        
        let lb = document.getElementById('lightbox');
        if (!lb) {
            lb = document.createElement('div');
            lb.id = 'lightbox';
            lb.className = 'lightbox';
            lb.innerHTML = `
                <span class="lightbox-close">&times;</span>
                <button class="lightbox-prev"><i class="fas fa-chevron-left"></i></button>
                <img id="lightboxImg" src="">
                <button class="lightbox-next"><i class="fas fa-chevron-right"></i></button>
            `;
            document.body.appendChild(lb);
            
            lb.querySelector('.lightbox-close').onclick = () => lb.style.display = 'none';
            lb.querySelector('.lightbox-prev').onclick = () => {
                currentIdx = (currentIdx - 1 + galleryImages.length) % galleryImages.length;
                document.getElementById('lightboxImg').src = galleryImages[currentIdx];
            };
            lb.querySelector('.lightbox-next').onclick = () => {
                currentIdx = (currentIdx + 1) % galleryImages.length;
                document.getElementById('lightboxImg').src = galleryImages[currentIdx];
            };
            lb.onclick = (e) => { if (e.target === lb) lb.style.display = 'none'; };
        }
        
        document.getElementById('lightboxImg').src = galleryImages[currentIdx];
        lb.style.display = 'flex';
        
        // Update navigasi
        const prevBtn = lb.querySelector('.lightbox-prev');
        const nextBtn = lb.querySelector('.lightbox-next');
        if (galleryImages.length <= 1) {
            prevBtn.style.display = 'none';
            nextBtn.style.display = 'none';
        } else {
            prevBtn.style.display = 'flex';
            nextBtn.style.display = 'flex';
        }
    };

    // ========== LOAD DETAIL BERITA ==========
    async function loadDetail() {
        const newsId = getNewsIdFromUrl();
        if (!newsId) {
            document.getElementById('detailContainer').innerHTML = '<div class="error-message">❌ Berita tidak ditemukan. <a href="index.html">Kembali ke Beranda</a></div>';
            return;
        }
        
        try {
            const snapshot = await database.ref(`news/${newsId}`).once('value');
            const news = snapshot.val();
            
            if (!news) {
                document.getElementById('detailContainer').innerHTML = '<div class="error-message">❌ Berita tidak ditemukan. <a href="index.html">Kembali ke Beranda</a></div>';
                return;
            }
            
            // Update title
            document.title = news.title + " - Insight News Indonesia";
            
            // Kumpulkan semua gambar (thumbnail + galeri) untuk gallery
            let allImages = [];
            if (news.images && news.images.length) {
                allImages = [...news.images];
            } else if (news.image) {
                allImages = [news.image];
            }
            
            // Video
            let videos = '';
            if (news.videos && news.videos.length) {
                videos = news.videos.map(v => `<div class="video-container"><iframe src="${v}" frameborder="0" allowfullscreen></iframe></div>`).join('');
            } else if (news.videoUrl) {
                videos = `<div class="video-container"><iframe src="${news.videoUrl}" frameborder="0" allowfullscreen></iframe></div>`;
            }
            
            // Share URL
            const shareUrl = `${window.location.origin}${window.location.pathname}#${newsId}`;
            const shareText = encodeURIComponent(`📰 ${news.title}\n\n`);
            
            const shareButtons = `
                <div class="share-buttons">
                    <a href="https://wa.me/?text=${shareText}${encodeURIComponent(shareUrl)}" target="_blank" class="share-btn share-wa"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                    <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}" target="_blank" class="share-btn share-fb"><i class="fab fa-facebook-f"></i> Facebook</a>
                    <a href="https://twitter.com/intent/tweet?text=${encodeURIComponent(news.title)}&url=${encodeURIComponent(shareUrl)}" target="_blank" class="share-btn share-twitter"><i class="fab fa-twitter"></i> Twitter</a>
                    <button class="share-btn share-copy" onclick="copyToClipboard('${shareUrl.replace(/'/g, "\\'")}')"><i class="fas fa-link"></i> Salin Link</button>
                </div>
            `;
            
            // Update meta tags untuk sosial media
            updateMetaTags(news, shareUrl, allImages[0]);
            
            const html = `
                <h1 class="detail-title">${escapeHtml(news.title)}</h1>
                <div class="detail-meta">
                    <span><i class="far fa-calendar"></i> ${new Date(news.date).toLocaleDateString('id-ID', {year:'numeric', month:'long', day:'numeric'})}</span>
                    <span><i class="far fa-eye"></i> ${formatNumber(news.views)} views</span>
                    <span><i class="fas fa-tag"></i> ${(news.category || 'Umum').toUpperCase()}</span>
                </div>
                ${shareButtons}
                ${renderGallery(allImages)}
                ${videos}
                <div class="detail-content">${news.content || '<p>Konten tidak tersedia</p>'}</div>
            `;
            
            document.getElementById('detailContainer').innerHTML = html;
            
            // Update views di background
            database.ref(`news/${newsId}/views`).set((news.views || 0) + 1).catch(err => console.log('Update views error:', err));
            
        } catch (error) {
            console.error('Error loading detail:', error);
            document.getElementById('detailContainer').innerHTML = '<div class="error-message">⚠️ Gagal memuat berita. Silakan coba lagi.</div>';
        }
    }
    
    function updateMetaTags(news, shareUrl, imageUrl) {
        // Update meta tags dinamis
        let ogTitle = document.querySelector('meta[property="og:title"]');
        let ogDesc = document.querySelector('meta[property="og:description"]');
        let ogImage = document.querySelector('meta[property="og:image"]');
        
        if (!ogTitle) {
            ogTitle = document.createElement('meta');
            ogTitle.setAttribute('property', 'og:title');
            document.head.appendChild(ogTitle);
        }
        if (!ogDesc) {
            ogDesc = document.createElement('meta');
            ogDesc.setAttribute('property', 'og:description');
            document.head.appendChild(ogDesc);
        }
        if (!ogImage) {
            ogImage = document.createElement('meta');
            ogImage.setAttribute('property', 'og:image');
            document.head.appendChild(ogImage);
        }
        
        ogTitle.setAttribute('content', news.title);
        ogDesc.setAttribute('content', news.shortText || news.content?.substring(0, 160) || "Baca berita lengkap di Insight News Indonesia");
        ogImage.setAttribute('content', imageUrl || 'https://portalinsight.github.io/NewsIndonesia/Images/default.jpg');
    }
    
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => alert('✅ Tautan berita disalin!')).catch(() => alert('Gagal menyalin.'));
    }
    
    // ========== DARK MODE ==========
    function initDarkMode() {
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.body.classList.add('dark');
            const icon = document.querySelector('#darkModeToggle i');
            if (icon) icon.className = 'fas fa-sun';
        }
    }
    function toggleDarkMode() {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        const icon = document.querySelector('#darkModeToggle i');
        if (isDark) {
            icon.className = 'fas fa-sun';
            localStorage.setItem('darkMode', 'enabled');
        } else {
            icon.className = 'fas fa-moon';
            localStorage.setItem('darkMode', 'disabled');
        }
    }
    function updateDateTime() {
        const el = document.getElementById('datetime');
        if (el) el.innerHTML = new Date().toLocaleDateString('id-ID', { weekday:'long', year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' });
    }
    
    // Search
    document.getElementById('searchInput')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const query = e.target.value.trim();
            if (query) window.location.href = `index.html?search=${encodeURIComponent(query)}`;
        }
    });
    
    document.getElementById('darkModeToggle')?.addEventListener('click', toggleDarkMode);
    initDarkMode();
    updateDateTime();
    setInterval(updateDateTime, 60000);
    
    // Load detail
    window.addEventListener('DOMContentLoaded', () => {
        loadDetail();
    });
</script>
</body>
</html>
